<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Movement Test Area</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; border-radius: 8px; min-width: 200px; z-index: 10; }
        .ui-controls { margin-top: 10px; pointer-events: auto; background: rgba(255,255,255,0.1); padding: 5px; border-radius: 4px; }
        #stamina-container { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; margin-top: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #stamina-bar { width: 100%; height: 100%; background: #44ff44; transition: width 0.1s linear, background-color 0.3s; }
        
        .joystick-base { position: absolute; bottom: 30px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3); display: flex; justify-content: center; align-items: center; touch-action: none; z-index: 10; }
        #base-left { left: 30px; }
        .joystick-stick { width: 50px; height: 50px; background: rgba(255, 255, 255, 0.6); border-radius: 50%; position: absolute; pointer-events: none; z-index: 5; }
        
        #jump-btn, #reset-cam-btn, #build-btn { position: absolute; bottom: 170px; width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.5); display: flex; justify-content: center; align-items: center; color: white; font-family: monospace; font-weight: bold; touch-action: none; cursor: pointer; z-index: 10; }
        #jump-btn { right: 45px; background: rgba(100, 255, 100, 0.5); }
        #build-btn { right: 125px; background: rgba(255, 150, 50, 0.5); }
        #reset-cam-btn { left: 45px; background: rgba(100, 100, 255, 0.5); font-size: 10px; text-align: center; }
        #jump-btn:active, #reset-cam-btn:active, #build-btn:active { opacity: 0.8; transform: scale(0.95); }
        
        .ledge-hint-container { position: absolute; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity 0.2s; border-radius: 50%; overflow: hidden; }
        .ledge-hint-line { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(255, 0, 0, 0.2); transform: translateX(-50%); }
        .ledge-hint { position: absolute; font-size: 10px; font-weight: bold; color: #fff; background: rgba(255, 0, 0, 0.8); padding: 2px 10px; border-radius: 4px; left: 50%; transform: translateX(-50%); z-index: 2; font-family: monospace; }
        .ledge-hint.up { top: 5px; width: 40px; text-align: center; }
        .ledge-hint.down { bottom: 5px; width: 40px; text-align: center; }
        #base-left.ledge-mode .ledge-hint-container { opacity: 1; }
        #base-left.ledge-mode { border-color: rgba(255, 0, 0, 0.5); background: rgba(255, 0, 0, 0.1); }
        
        #msg-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: gold; font-family: monospace; font-weight: bold; font-size: 32px; text-shadow: 2px 2px #000; pointer-events: none; z-index: 20; }
    </style>
</head>
<body>
    <div id="ui">
        WASD/Left: Move | Look: Drag | Space: Jump
        <div id="stamina-container"><div id="stamina-bar"></div></div>
        <div class="ui-controls">
            <label>Jump Force: <span id="force-val">1.0</span>x</label><br>
            <input type="range" id="ledge-force-slider" min="0.2" max="3.0" step="0.1" value="1.0" style="width: 100%;">
            <br>
            <label>Model Scale: <span id="scale-val">0.0055</span></label><br>
            <input type="range" id="scale-slider" min="0.001" max="0.02" step="0.0005" value="0.0055" style="width: 100%;">
            <br>
            <label>Ledge Offset: <span id="offset-val">0.06</span></label><br>
            <input type="range" id="offset-slider" min="0.0" max="0.5" step="0.01" value="0.06" style="width: 100%;">
        </div>
    </div>
    <div id="msg-overlay">GOAL REACHED!</div>
    <div id="jump-btn">JUMP</div>
    <div id="build-btn">BUILD</div>
    <div id="reset-cam-btn">RESET<br>CAM</div>
    <div id="base-left" class="joystick-base">
        <div id="ledge-hint-container" class="ledge-hint-container">
            <div class="ledge-hint-line"></div>
            <span class="ledge-hint up">CLIMB</span>
            <span class="ledge-hint down">DROP</span>
        </div>
        <div id="stick-left" class="joystick-stick"></div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        class Character {
            constructor(scene) {
                this.group = new THREE.Group();
                scene.add(this.group);

                const hitboxGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.8, 8);
                const hitboxMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true, transparent: true, opacity: 0.5 });
                this.hitbox = new THREE.Mesh(hitboxGeo, hitboxMat);
                this.hitbox.position.y = 0.9;
                this.group.add(this.hitbox);
            
                this.mixer = null;
                this.actions = {};
                this.activeAction = null;
                this.isLoaded = false;
                this.fbxModel = null;
                this.climbFinished = false;

                const baseUrl = 'https://raw.githubusercontent.com/XYremesher/CustomGizmo/main/Editor/IKRig/';
                const loader = new FBXLoader();

                loader.load(baseUrl + 'StickMan.fbx', (object) => {
                    this.fbxModel = object;
                    object.scale.setScalar(parseFloat(document.getElementById('scale-slider').value));
                    object.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    this.group.add(object);
                    this.mixer = new THREE.AnimationMixer(object);
                    
                    this.mixer.addEventListener('finished', (e) => {
                        if (e.action === this.actions['climb']) {
                            this.climbFinished = true;
                        }
                    });

                    const anims = [
                        { name: 'idle', file: 'Idle.fbx' },
                        { name: 'walk', file: 'Walking.fbx' },
                        { name: 'run', file: 'Running.fbx' },
                        { name: 'jump_start', file: 'JumpStart.fbx' },
                        { name: 'fall', file: 'JumpMidAir.fbx' },
                        { name: 'land', file: 'Landing.fbx' },
                        { name: 'hang_idle', file: 'Hanging%20Idle.fbx' },
                        { name: 'hang_left', file: 'Moving%20While%20Hanging%20Left.fbx' },
                        { name: 'hang_right', file: 'Moving%20While%20Hanging%20Right.fbx' },
                        { name: 'climb', file: 'Freehang%20Climb.fbx' }
                    ];

                    let loadedCount = 0;
                    anims.forEach(anim => {
                        loader.load(baseUrl + anim.file, (animObj) => {
                            if (animObj.animations.length > 0) {
                                const action = this.mixer.clipAction(animObj.animations[0]);
                                if(anim.name === 'jump_start' || anim.name === 'climb') {
                                    action.setLoop(THREE.LoopOnce);
                                    action.clampWhenFinished = true;
                                }
                                this.actions[anim.name] = action;
                            }
                            loadedCount++;
                            if (loadedCount === anims.length) {
                                this.isLoaded = true;
                                this.fadeToAction('idle', 0);
                            }
                        });
                    });
                });
            }

            updateScale(val) {
                if (this.fbxModel) this.fbxModel.scale.setScalar(val);
                const ratio = val / 0.0055;
                this.hitbox.scale.setScalar(ratio);
            }

            fadeToAction(name, duration = 0.2) {
            if (!this.isLoaded || !this.actions[name]) return;
            const action = this.actions[name];
            if (this.activeAction === action) return;

            const previousAction = this.activeAction;
            this.activeAction = action;

            if (previousAction) {
                if (duration <= 0) previousAction.stop();
                else previousAction.fadeOut(duration);
            }

            this.activeAction.reset().setEffectiveTimeScale(1).setEffectiveWeight(1);
            if (duration > 0) this.activeAction.fadeIn(duration);
            this.activeAction.play();
        }

        animate(delta, state, moveMag, time, yVelocity, moveDirX, forceSnap = false) {
            if (this.mixer) this.mixer.update(delta);
            if (!this.isLoaded) return;

            const dur = forceSnap ? 0 : 0.2;

            if (state === 'climbing') {
                this.fadeToAction('climb', dur);
            } else if (state === 'ledge') {
                if (moveMag > 0.1) {
                    if (moveDirX > 0.1) this.fadeToAction('hang_right', dur);
                    else if (moveDirX < -0.1) this.fadeToAction('hang_left', dur);
                    else this.fadeToAction('hang_idle', dur);
                } else {
                    this.fadeToAction('hang_idle', dur);
                }
            } else if (state === 'walk') {
                if (moveMag > 0.8) this.fadeToAction('run', dur);
                else this.fadeToAction('walk', dur);
            } else if (state === 'air') {
                if (yVelocity > 0) this.fadeToAction('jump_start', dur);
                else this.fadeToAction('fall', dur);
            } else if (state === 'landing') {
                this.fadeToAction('land', dur);
            } else {
                this.fadeToAction('idle', dur);
            }
        }
    }

    const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 10, 150);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const collidables = [];
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x44aa44 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground); collidables.push(ground);

        const cubeSize = 3.0;
        const platMat = new THREE.MeshStandardMaterial({ color: 0x5555aa });
        const boxGeoTemplate = new RoundedBoxGeometry(cubeSize, cubeSize, cubeSize, 1, 0.15);

        const hazards = [];
        const hazardMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0x441111 });
        const sphereGeo = new THREE.SphereGeometry(1.2, 16, 16);

        function createHazard(x, y, z, range = 5, speed = 2, axis = 'x') {
            const mesh = new THREE.Mesh(sphereGeo, hazardMat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            hazards.push({ mesh, x, y, z, range, speed, axis });
        }

        function generateLevel() {
            const startZ = -40;
            const endZ = 0;
            let currentZ = startZ;
            let currentY = 0;
            
            for(let x=-1; x<=1; x++) {
                const mesh = new THREE.Mesh(boxGeoTemplate, platMat);
                mesh.position.set(x * cubeSize, cubeSize/2, startZ);
                mesh.castShadow = true; mesh.receiveShadow = true;
                scene.add(mesh); collidables.push(mesh);
            }

            while (currentZ < endZ - 10) {
                currentZ += (cubeSize + Math.random() * 5 + 2);
                currentY += (Math.random() > 0.4 ? cubeSize : 0);
                const x = (Math.random() - 0.5) * 12;
                const mesh = new THREE.Mesh(boxGeoTemplate, platMat);
                mesh.position.set(x, currentY + cubeSize/2, currentZ);
                mesh.castShadow = true; mesh.receiveShadow = true;
                scene.add(mesh); collidables.push(mesh);
                if (Math.random() > 0.4) createHazard(x + (Math.random()-0.5)*15, currentY + 3, currentZ, 4 + Math.random()*4, 1.0 + Math.random()*2, Math.random() > 0.5 ? 'x' : 'y');
            }

            const gSize = 10, hSize = 35;
            let grid = Array(gSize).fill(0).map(()=>Array(hSize).fill(0).map(()=>Array(gSize).fill(false)));
            for(let x=4; x<=5; x++) for(let y=0; y<hSize; y++) for(let z=4; z<=5; z++) grid[x][y][z] = true;
            for(let x=0; x<gSize; x++) for(let y=0; y<hSize; y++) for(let z=0; z<gSize; z++) if(Math.random() > 0.88) grid[x][y][z] = true;

            const geometries = [];
            const matrix = new THREE.Matrix4();
            for(let x=0; x<gSize; x++) {
                for(let y=0; y<hSize; y++) {
                    for(let z=0; z<gSize; z++) {
                        if(grid[x][y][z]) {
                            const px = (x - gSize/2) * cubeSize + cubeSize/2;
                            const py = y * cubeSize + cubeSize/2;
                            const pz = (z - gSize/2) * cubeSize + cubeSize/2;
                            const m = new THREE.Mesh(boxGeoTemplate, platMat);
                            m.position.set(px, py, pz);
                            m.castShadow = true; m.receiveShadow = true;
                            scene.add(m); collidables.push(m);
                        }
                    }
                }
            }
            return hSize * cubeSize;
        }

        const towerTopY = generateLevel();
        const starGeo = new THREE.OctahedronGeometry(1.2);
        const starMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xaa8800 });
        const star = new THREE.Mesh(starGeo, starMat);
        star.position.set(0, towerTopY + 2, 0);
        scene.add(star);

        const char = new Character(scene);
        char.group.position.set(0, 5, -40);

        const buildPreview = new THREE.Mesh(boxGeoTemplate, new THREE.MeshStandardMaterial({ color: 0x00ff00, transparent: true, opacity: 0.4 }));
        buildPreview.visible = false; scene.add(buildPreview);
        const gridHelper = new THREE.GridHelper(cubeSize*6, 6, 0xffffff, 0x888888);
        gridHelper.visible = false; scene.add(gridHelper);

        let isBuilding = false, canPlace = false;
        document.getElementById('build-btn').addEventListener('pointerdown', () => { isBuilding = true; buildPreview.visible = true; gridHelper.visible = true; });
        window.addEventListener('pointerup', () => {
            if (isBuilding) {
                if (canPlace) {
                    const newCube = new THREE.Mesh(boxGeoTemplate, platMat.clone());
                    newCube.position.copy(buildPreview.position);
                    newCube.castShadow = true; newCube.receiveShadow = true;
                    scene.add(newCube); collidables.push(newCube);
                }
                isBuilding = false; buildPreview.visible = false; gridHelper.visible = false;
            }
        });

        const input = { left: { x: 0, y: 0 } };
        const keys = { w: false, a: false, s: false, d: false };
        let cameraTheta = Math.PI, cameraPhi = Math.PI/3, cameraRadius = 12, yVelocity = 0;

        function setupJoystick(baseId, stickId) {
            const base = document.getElementById(baseId), stick = document.getElementById(stickId);
            let activePointer = null, maxR = 40;
            const update = (e) => {
                const rect = base.getBoundingClientRect(), cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
                let dx = e.clientX - cx, dy = e.clientY - cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > maxR) { dx *= maxR/dist; dy *= maxR/dist; }
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                input.left.x = dx/maxR; input.left.y = dy/maxR;
            };
            base.addEventListener('pointerdown', (e) => { activePointer = e.pointerId; base.setPointerCapture(activePointer); update(e); });
            base.addEventListener('pointermove', (e) => { if (activePointer === e.pointerId) update(e); });
            base.addEventListener('pointerup', (e) => { if (activePointer !== e.pointerId) return; activePointer = null; stick.style.transform = `translate(0,0)`; input.left.x = 0; input.left.y = 0; });
        }
        setupJoystick('base-left', 'stick-left');

        window.addEventListener('keydown', e => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = true; if (e.code === 'Space') handleJump(); });
        window.addEventListener('keyup', e => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = false; });

        let isLook = false, lX, lY;
        window.addEventListener('pointerdown', e => { if (!e.target.closest('.joystick-base') && e.target.id.indexOf('btn') === -1) { isLook = true; lX=e.clientX; lY=e.clientY; } });
        window.addEventListener('pointermove', e => { if (isLook) { cameraTheta -= (e.clientX-lX)*0.005; cameraPhi = Math.max(0.1, Math.min(3.0, cameraPhi-(e.clientY-lY)*0.005)); lX=e.clientX; lY=e.clientY; } });
        window.addEventListener('pointerup', () => isLook=false);
        document.getElementById('reset-cam-btn').addEventListener('pointerdown', () => { cameraTheta = char.group.rotation.y + Math.PI; cameraPhi = Math.PI/3; });

        let stamina = 100, isGrounded = false, isLedgeGrabbing = false, isClimbingUp = false, ledgeTarget = new THREE.Vector3(), jumpMomentum = new THREE.Vector3();
        let lastLedgeState = false, lockedHintAngle = null, ledgeGrabTimer = 0, ledgeGrabCooldown = 0, ledgeJumpMultiplier = 1.0, landingTimer = 0;
        let ledgeOffset = 0.06;
        const STAMINA_MAX = 100, REGEN_RATE = 25, HANG_DRAIN = 2, JUMP_COST = 8, LEDGE_JUMP_COST = 12, LEDGE_MOVE_COST = 4, CLIMB_COST = 4, LANDING_ANIM_DURATION = 0.5;

        document.getElementById('ledge-force-slider').addEventListener('input', e => { ledgeJumpMultiplier = parseFloat(e.target.value); document.getElementById('force-val').innerText = ledgeJumpMultiplier.toFixed(1); });
        document.getElementById('scale-slider').addEventListener('input', e => { const val = parseFloat(e.target.value); document.getElementById('scale-val').innerText = val.toFixed(4); char.updateScale(val); });
        document.getElementById('offset-slider').addEventListener('input', e => { ledgeOffset = parseFloat(e.target.value); document.getElementById('offset-val').innerText = ledgeOffset.toFixed(2); });

        function handleJump() {
            if (stamina < JUMP_COST || landingTimer > 0) return;
            if (isGrounded && !isLedgeGrabbing && !isClimbingUp) { stamina -= JUMP_COST; yVelocity = 10; isGrounded = false; landingTimer = 0; }
            else if (isLedgeGrabbing || isClimbingUp || (!isGrounded && ledgeGrabCooldown > 0.1)) {
                if (stamina < LEDGE_JUMP_COST) return; stamina -= LEDGE_JUMP_COST;
                let action = 'jump_up';
                const curX = Math.abs(input.left.x) > 0.1 ? input.left.x : (keys.a ? -1 : (keys.d ? 1 : 0));
                const curY = Math.abs(input.left.y) > 0.1 ? input.left.y : (keys.w ? -1 : (keys.s ? 1 : 0));
                if (!isLedgeGrabbing && !isClimbingUp) action = 'jump_back';
                else {
                    const mag = Math.sqrt(curX*curX + curY*curY);
                    let refAngle = lockedHintAngle === null ? (Math.PI - Math.atan2(new THREE.Vector3(0,0,1).applyQuaternion(char.group.quaternion).x, new THREE.Vector3(0,0,1).applyQuaternion(char.group.quaternion).z) + cameraTheta) : lockedHintAngle;
                    if (mag > 0.3) {
                        const stickVec = new THREE.Vector2(curX, curY).normalize(), uiUp = new THREE.Vector2(Math.sin(refAngle), -Math.cos(refAngle)).normalize();
                        if (stickVec.dot(uiUp) > 0.4) action = 'jump_up_boost'; else if (stickVec.dot(uiUp) < -0.4) action = 'jump_back';
                    }
                }
                const fwd = new THREE.Vector3(0,0,1).applyQuaternion(char.group.quaternion);
                if (action === 'jump_up_boost') { isLedgeGrabbing = false; isClimbingUp = true; lockedHintAngle = null; char.climbFinished = false; }
                else if (action === 'jump_back') { isLedgeGrabbing = false; isClimbingUp = false; yVelocity = 10*ledgeJumpMultiplier; jumpMomentum.copy(fwd.negate().multiplyScalar(15*ledgeJumpMultiplier)); lockedHintAngle = null; ledgeGrabCooldown = 0.5; }
                else { isLedgeGrabbing = false; isClimbingUp = true; lockedHintAngle = null; char.climbFinished = false; }
            }
        }

        const clock = new THREE.Clock();
        const rayDown = new THREE.Raycaster(), rayFwd = new THREE.Raycaster(), downVec = new THREE.Vector3(0,-1,0);

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1), time = Date.now()*0.001;

            hazards.forEach(h => {
                const offset = Math.sin(time * h.speed) * h.range;
                if (h.axis === 'x') h.mesh.position.x = h.x + offset; else h.mesh.position.y = h.y + offset;
                if (char.group.position.distanceTo(h.mesh.position) < 2.2) char.group.position.set(0, 5, -40); 
            });

            const curX = Math.abs(input.left.x) > 0.1 ? input.left.x : (keys.a ? -1 : (keys.d ? 1 : 0));
            const curY = Math.abs(input.left.y) > 0.1 ? input.left.y : (keys.w ? -1 : (keys.s ? 1 : 0));
            const moveMag = Math.min(Math.sqrt(curX*curX + curY*curY), 1.0);

            if (isBuilding) {
                const snap = v => Math.floor(v / cubeSize) * cubeSize + cubeSize/2;
                const fwd = new THREE.Vector3(0,0,1).applyQuaternion(char.group.quaternion);
                const targetPos = char.group.position.clone().add(fwd.multiplyScalar(cubeSize*1.5));
                const px = snap(targetPos.x), py = snap(char.group.position.y + 1.5), pz = snap(targetPos.z);
                buildPreview.position.set(px, py, pz); gridHelper.position.set(px, py-cubeSize/2+0.05, pz);
                canPlace = true;
                for (let o of collidables) if (o !== ground && o.position.distanceTo(buildPreview.position) < 0.1) canPlace = false;
                if (char.group.position.distanceTo(new THREE.Vector3(px, char.group.position.y, pz)) < cubeSize*0.7) canPlace = false;
                buildPreview.material.color.set(canPlace ? 0x00ff00 : 0xff0000);
            }

            if (star.visible) {
                star.rotation.y += delta;
                if (char.group.position.distanceTo(star.position) < 3.0) { star.visible = false; document.getElementById('msg-overlay').style.display = 'block'; }
            }

            if (ledgeGrabCooldown > 0) ledgeGrabCooldown -= delta;
            if (isLedgeGrabbing !== lastLedgeState) {
                if (isLedgeGrabbing) { document.getElementById('base-left').classList.add('ledge-mode'); ledgeGrabTimer = 0; }
                else document.getElementById('base-left').classList.remove('ledge-mode');
                lastLedgeState = isLedgeGrabbing;
            }

            if (isLedgeGrabbing) { stamina -= HANG_DRAIN*delta; if (moveMag > 0.1) stamina -= LEDGE_MOVE_COST*delta; }
            else if (isGrounded && moveMag < 0.1 && yVelocity === 0) stamina += REGEN_RATE*delta;
            else if (isClimbingUp) stamina -= CLIMB_COST*delta;
            stamina = Math.max(0, Math.min(STAMINA_MAX, stamina));
            document.getElementById('stamina-bar').style.width = stamina + '%';

            let currentPushS = 0;

            if (isClimbingUp) {
            char.animate(delta, 'climbing', 0, time, 0, 0);
            if (char.climbFinished) {
                const fwd = new THREE.Vector3(0,0,1).applyQuaternion(char.group.quaternion);
                char.group.position.y = ledgeTarget.y;
                char.group.position.x += fwd.x * 1.1;
                char.group.position.z += fwd.z * 1.1;
                isClimbingUp = false;
                char.climbFinished = false;
                yVelocity = 0;
                isGrounded = true;
                landingTimer = 0;
                ledgeGrabCooldown = 0.5;
                char.animate(delta, 'idle', 0, time, 0, 0, true);
            }
        } else if (isLedgeGrabbing) {
                yVelocity = 0; ledgeGrabTimer += delta;
                
                const chest = char.group.position.clone().setY(char.group.position.y+1.1);
                const charFwd = new THREE.Vector3(0,0,1).applyQuaternion(char.group.quaternion);
                rayFwd.set(chest, charFwd);
                const wallHits = rayFwd.intersectObjects(collidables);
                if (wallHits.length > 0 && wallHits[0].distance < 1.0) {
                    const n = wallHits[0].face.normal.clone().transformDirection(wallHits[0].object.matrixWorld).setY(0).normalize();
                    char.group.position.x = wallHits[0].point.x + n.x * ledgeOffset;
                    char.group.position.z = wallHits[0].point.z + n.z * ledgeOffset;
                    char.group.lookAt(char.group.position.clone().sub(n));
                }

                const actualRgt = new THREE.Vector3(1,0,0).applyQuaternion(char.group.quaternion);
                let hint = Math.PI - Math.atan2(charFwd.x, charFwd.z) + cameraTheta;
                if (lockedHintAngle === null) document.getElementById('ledge-hint-container').style.transform = `rotate(${hint}rad)`;
                
                if (moveMag > 0.1) {
                    if (lockedHintAngle === null) { lockedHintAngle = hint; document.getElementById('ledge-hint-container').style.transform = `rotate(${lockedHintAngle}rad)`; }
                    const stickVec = new THREE.Vector2(curX, curY).normalize(), uiUp = new THREE.Vector2(Math.sin(lockedHintAngle), -Math.cos(lockedHintAngle)).normalize(), uiRgt = new THREE.Vector2(Math.cos(lockedHintAngle), Math.sin(lockedHintAngle)).normalize();
                    const pCD = stickVec.dot(uiUp), pS = stickVec.dot(uiRgt);
                    currentPushS = pS;
                    
                    if (ledgeGrabTimer > 0.2) {
                        if (pCD > 0.6) { isLedgeGrabbing = false; isClimbingUp = true; lockedHintAngle = null; char.climbFinished = false; }
                        else if (pCD < -0.6) { isLedgeGrabbing = false; lockedHintAngle = null; yVelocity = -3; ledgeGrabCooldown = 0.5; return; }
                    }
                    
                    if (Math.abs(pS) > 0.1) {
                        const mDir = actualRgt.clone().multiplyScalar(-Math.sign(pS));
                        let handled = false;
                        const sideRay = new THREE.Raycaster(chest, mDir);
                        const sH = sideRay.intersectObjects(collidables);
                        
                        if (sH.length > 0 && sH[0].distance < 0.8) {
                             const n = sH[0].face.normal.clone().transformDirection(sH[0].object.matrixWorld).setY(0).normalize();
                             const top = sH[0].point.clone().add(n.clone().multiplyScalar(-0.2)).setY(sH[0].point.y+2.0);
                             rayDown.set(top, downVec); const h = rayDown.intersectObjects(collidables);
                             if (h.length > 0 && Math.abs(h[0].point.y - (char.group.position.y + 1.7)) < 0.8) {
                                 char.group.position.copy(sH[0].point.clone().add(n.clone().multiplyScalar(ledgeOffset)).setY(h[0].point.y-1.7));
                                 ledgeTarget.copy(h[0].point); char.group.lookAt(char.group.position.clone().sub(n)); handled = true;
                             }
                        }
                        if (!handled && !(sH.length > 0 && sH[0].distance < 0.65)) char.group.position.add(mDir.multiplyScalar(4*delta));
                    }
                } else lockedHintAngle = null;
                char.animate(delta, 'ledge', moveMag, time, 0, currentPushS);
            } else {
                if (moveMag > 0.1 && landingTimer <= 0) {
                    const mAng = cameraTheta + Math.atan2(curX, curY), mDir = new THREE.Vector3(Math.sin(mAng), 0, Math.cos(mAng));
                    rayFwd.set(char.group.position.clone().setY(char.group.position.y+0.3), mDir);
                    const collisions = rayFwd.intersectObjects(collidables);
                    if (collisions.length === 0 || collisions[0].distance > 0.5) char.group.position.add(mDir.multiplyScalar(8*moveMag*delta));
                    char.group.quaternion.slerp(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), mAng), 15*delta);
                }
                if (!isGrounded && yVelocity < 2 && ledgeGrabCooldown <= 0) {
                    const chest = char.group.position.clone().setY(char.group.position.y+1.1), fwd = new THREE.Vector3(0,0,1).applyQuaternion(char.group.quaternion);
                    rayFwd.set(chest, fwd); const wH = rayFwd.intersectObjects(collidables);
                    if (wH.length > 0 && wH[0].distance < 0.8) {
                        const n = wH[0].face.normal.clone().transformDirection(wH[0].object.matrixWorld).setY(0).normalize();
                        const top = wH[0].point.clone().add(fwd.clone().multiplyScalar(0.2)).setY(wH[0].point.y+2.0);
                        rayDown.set(top, downVec); const lH = rayDown.intersectObjects(collidables);
                        if (lH.length > 0 && lH[0].point.y > char.group.position.y && lH[0].point.y < char.group.position.y+2.5) {
                            isLedgeGrabbing = true; yVelocity = 0; ledgeTarget.copy(lH[0].point);
                            char.group.position.y = lH[0].point.y-1.7; char.group.position.x = wH[0].point.x + n.x*ledgeOffset; char.group.position.z = wH[0].point.z + n.z*ledgeOffset;
                            char.group.lookAt(char.group.position.clone().sub(n)); jumpMomentum.set(0,0,0);
                        }
                    }
                }
                if (jumpMomentum.lengthSq() > 0.01) { char.group.position.add(jumpMomentum.clone().multiplyScalar(delta)); jumpMomentum.lerp(new THREE.Vector3(), 4*delta); }
                rayDown.set(char.group.position.clone().setY(char.group.position.y+0.5), downVec);
                const dH = rayDown.intersectObjects(collidables);
                let floorY = dH.length > 0 ? dH[0].point.y : -99;
                if (char.group.position.y + yVelocity*delta > floorY + 0.01) { yVelocity -= 30*delta; isGrounded = false; char.group.position.y += yVelocity*delta; }
                else { char.group.position.y = floorY; yVelocity = 0; isGrounded = true; jumpMomentum.set(0,0,0); }
                if (landingTimer > 0) landingTimer -= delta;
                
                if (isGrounded) {
                    if (landingTimer > 0) char.animate(delta, 'landing', moveMag, time, yVelocity, 0);
                    else if (moveMag > 0.1) char.animate(delta, 'walk', moveMag, time, yVelocity, 0);
                    else char.animate(delta, 'idle', 0, time, 0, 0);
                } else {
                    char.animate(delta, 'air', moveMag, time, yVelocity, 0);
                }
            }
            camera.position.lerp(new THREE.Vector3(char.group.position.x + cameraRadius*Math.sin(cameraPhi)*Math.sin(cameraTheta), char.group.position.y + cameraRadius*Math.cos(cameraPhi)+1.5, char.group.position.z + cameraRadius*Math.sin(cameraPhi)*Math.cos(cameraTheta)), 0.1);
            camera.lookAt(char.group.position.x, char.group.position.y+1, char.group.position.z);
            renderer.render(scene, camera);
        }
        window.onload = animate;
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
