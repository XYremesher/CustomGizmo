<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Editor Pro</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root { --ui-width: 107px; }
        body { margin: 0; overflow: hidden; background-color: #3d3d3d; font-family: sans-serif; display: flex; touch-action: none; }
        canvas { display: block; }
        #ui-container { position: absolute; top: 0; right: 0; width: var(--ui-width); max-height: 100vh; background: rgba(30, 30, 30, 0.95); border-left: 1px solid #444; border-bottom: 1px solid #444; border-bottom-left-radius: 4px; color: #ccc; display: flex; flex-direction: row; z-index: 100; transition: transform 0.3s ease; }
        #ui-container.collapsed { transform: translateX(calc(var(--ui-width) - 10px)); }
        .side-grip { width: 10px; align-self: stretch; background: #252525; cursor: col-resize; display: flex; align-items: center; justify-content: center; border-right: 1px solid #444; flex-shrink: 0; touch-action: none; border-bottom-left-radius: 4px; }
        .side-grip::after { content: ""; width: 2px; height: 20px; background: #555; border-radius: 1px; box-shadow: 0 4px 0 #555, 0 -4px 0 #555; }
        .drag-grip { width: 14px; background: #252525; color: #666; display: flex; align-items: center; justify-content: center; cursor: grab; border-right: 1px solid #444; font-size: 10px; user-select: none; border-radius: 3px 0 0 3px; touch-action: none; }
        .drag-grip:active { cursor: grabbing; }
        .panel-content-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .panel { padding: 6px; border-bottom: 1px solid #444; }
        .panel-title { font-size: 9px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; color: #888; }
        #outliner { flex-grow: 1; overflow: auto; border-bottom: 1px solid #444; padding-right: 3px; height: 0; touch-action: auto; }
        .outliner-item-container { padding: 2px; cursor: pointer; font-size: 9px; border-radius: 2px; display: flex; align-items: center; border: 1px solid transparent; user-select: none; width: max-content; min-width: 100%; box-sizing: border-box; }
        .outliner-item-container:hover { background: #333; }
        .outliner-item-container.selected { background: #0055aa; color: white; border-color: #0077cc; }
        .outliner-item-container.drag-over { border-bottom: 2px solid #00aaff; }
        .outliner-toggle { width: 10px; text-align: center; flex-shrink: 0; font-family: monospace; font-weight: bold; cursor: pointer; font-size: 8px; }
        .outliner-name { flex-grow: 1; white-space: nowrap; padding-left: 2px; pointer-events: auto; padding-right: 8px; }
        .outliner-vis { width: 12px; text-align: center; flex-shrink: 0; opacity: 0.6; font-size: 9px; cursor: pointer; }
        .outliner-vis:hover { opacity: 1.0; }
        .children-container { padding-left: 2px; border-left: 1px dotted #555; margin-left: 2px; }
        .transform-group { display: grid; grid-template-columns: 24px 1fr 1fr 1fr; gap: 2px; align-items: center; margin-bottom: 4px; }
        .transform-group label { font-size: 8px; color: #555; text-align: left; overflow: hidden; text-overflow: ellipsis; }
        input[type="number"], input[type="checkbox"], select, input[type="range"] { background: #111; border: 1px solid #444; color: #ccc; font-family: monospace; padding: 1px; width: 100%; font-size: 8px; outline: none; box-sizing: border-box; }
        input[type="checkbox"] { width: auto; margin: 0; }
        .btn { width: 100%; padding: 4px; background: #333; color: #bbb; border: 1px solid #444; cursor: pointer; font-size: 9px; margin-top: 2px; text-transform: uppercase; border-radius: 2px; }
        .btn:hover { background: #444; color: #fff; }
        .btn.primary { background: #0055aa; color: #fff; border-color: #0077cc; margin-top: 6px; }
        .action-group { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .floating-panel { position: absolute; background: rgba(30, 30, 30, 0.95); border: 1px solid #444; color: #ccc; z-index: 200; display: flex; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); }
        .drag-header-top { background: #252525; padding: 4px 6px; cursor: grab; font-size: 9px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #444; user-select: none; display: flex; justify-content: space-between; border-radius: 3px 3px 0 0; touch-action: none; }
        .drag-header-top:active { cursor: grabbing; }
        .floating-content { padding: 0; flex-grow: 1; display: flex; flex-direction: column; }
        .dropdown-panel { position: absolute; top: calc(100% + 4px); background: rgba(30, 30, 30, 0.95); border: 1px solid #444; border-radius: 4px; padding: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); display: none; z-index: 201; }
        .shape-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 4px; padding: 4px; background: #1a1a1a; border: 1px solid #333; border-radius: 2px; }
        .shape-grid button, .gizmo-btn, .square-btn { padding: 0; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: #222; border: 1px solid #555; border-radius: 3px; cursor: pointer; color: #ccc; transition: all 0.2s; font-size: 12px; }
        .shape-grid button:hover, .gizmo-btn:hover, .gizmo-btn.active, .square-btn:hover, .square-btn.active { background: #0055aa; border-color: #0077cc; color: #fff; }
        .gizmo-btn.active, .square-btn.active { background: #0055aa; border-color: #0077cc; }
        .shape-grid svg, .gizmo-btn svg, .square-btn svg { width: 14px; height: 14px; }
        #context-menu { position: absolute; background: #222; border: 1px solid #555; z-index: 1000; display: none; padding: 4px 0; border-radius: 2px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .context-menu-item { padding: 4px 12px; cursor: pointer; font-size: 9px; color: #ccc; }
        .context-menu-item:hover { background: #0055aa; color: #fff; }
        #collection-list { margin-top: 4px; max-height: 100px; overflow-y: auto; border: 1px solid #444; background: #1a1a1a; display: none; }
        .collection-entry { padding: 3px 6px; font-size: 9px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-entry .del-btn { color: #e74c3c; font-weight: bold; padding: 0 4px; margin-left: 5px; }
        #floating-properties .floating-content { max-height: 400px; overflow-y: auto; overflow-x: hidden; }
        #floating-properties::-webkit-scrollbar { width: 4px; }
        #floating-properties::-webkit-scrollbar-track { background: #1a1a1a; }
        #floating-properties::-webkit-scrollbar-thumb { background: #444; }
        .accordion-header { background: #252525; padding: 4px 6px; font-size: 8px; font-weight: bold; cursor: pointer; border-bottom: 1px solid #333; display: flex; justify-content: space-between; text-transform: uppercase; color: #aaa; }
        .accordion-header:hover { background: #333; color: #fff; }
        .accordion-content { display: flex; flex-direction: column; padding: 6px; display: none; background: rgba(20,20,20,0.5); }
        #floating-properties { width: 110px !important; }
        #floating-properties .transform-group { grid-template-columns: 32px 1fr 1fr 1fr; gap: 2px; margin-bottom: 2px; }
        #acc-transform .transform-group { grid-template-columns: 8px 1fr 1fr 1fr; gap: 2px; margin-left: -2px; }
        #acc-shape .transform-group, #acc-cuts .transform-group { grid-template-columns: 1fr 45px; }
        #floating-properties .transform-group label { font-size: 8px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #floating-properties input, #floating-properties select { font-size: 8px; padding: 0px 1px; height: 14px; width: 100%; box-sizing: border-box; }
        #floating-properties .accordion-header { font-size: 8px; padding: 3px 4px; }
        #floating-properties .drag-header-top { font-size: 8px; padding: 2px 4px; }
        #floating-properties .square-btn { width: 14px !important; height: 14px !important; padding: 1px !important; }
        #floating-properties .accordion-content { padding: 4px; }
        #stats-overlay { position: absolute; top: 4px; font-size: 8px; color: #ccc; pointer-events: none; text-align: right; font-family: monospace; z-index: 100; display: flex; flex-direction: column; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
        .bottom-resizer { width: 100%; height: 10px; background: #252525; cursor: row-resize; border-top: 1px solid #444; flex-shrink: 0; display: flex; align-items: center; justify-content: center; touch-action: none; border-bottom-left-radius: 4px; }
        .bottom-resizer::after { content: ""; width: 20px; height: 2px; background: #555; border-radius: 1px; }
    </style>
</head>
<body>
    <div id="gizmo-panel" class="floating-panel" style="top: 10px; left: 10px; flex-direction: row; width: 240px; box-sizing: border-box;">
        <div class="drag-grip" id="gizmo-drag-grip">⋮</div>
        <div style="display: flex; gap: 4px; padding: 4px; align-items: center; justify-content: space-between; flex-grow: 1;">
            <div style="display: flex; gap: 4px;">
                <button class="gizmo-btn active" id="btn-translate" title="Translate (W)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M19 9l3 3-3 3M9 19l3 3-3 3M2 12h20M12 2v20"></path></svg></button>
                <button class="gizmo-btn" id="btn-rotate" title="Rotate (E)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg></button>
                <button class="gizmo-btn" id="btn-scale" title="Scale (R)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 3l-6 6M21 3v6M21 3h-6M3 21l6-6M3 21v-6M3 21h6M15 15l6 6M15 15v6M15 15h6M9 9L3 3M9 9V3M9 9H3"></path></svg></button>
                <button class="gizmo-btn" id="btn-shape" style="color: #ffaa00;" title="Shape Controls (T)">⚒</button>
            </div>
            <div style="width: 1px; height: 16px; background: #444; margin: 0 2px;"></div>
            <div style="display: flex; gap: 4px;">
                <button class="btn" id="btn-space" style="width: 32px; height: 24px; margin: 0; padding: 0; font-size: 8px;" title="Toggle Space">WLD</button>
                <button class="btn" id="btn-focus" style="width: 32px; height: 24px; margin: 0; padding: 0; font-size: 8px;" title="Focus Selected">FCS</button>
                <button class="btn" id="btn-undo" style="width: 24px; height: 24px; margin: 0; padding: 0; font-size: 14px; border-radius: 50%;" title="Undo (Ctrl+Z)">↺</button>
            </div>
        </div>
    </div>

    <div id="add-panel" class="floating-panel" style="top: 46px; left: 10px; flex-direction: row; width: 103px; box-sizing: border-box;">
        <div class="drag-grip" id="add-drag-grip">⋮</div>
        <div style="display: flex; flex-direction: column; flex-grow: 1;">
            <div style="display: flex; gap: 4px; padding: 4px; justify-content: space-between;">
                <button id="add-shape-toggle" class="square-btn" title="Add Object"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                <button id="add-collection-toggle" class="square-btn" title="Add Entity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg></button>
                <button id="settings-toggle" class="square-btn" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
            </div>
        </div>
        <div id="shape-dropdown" class="dropdown-panel" style="left: 18px;">
            <div id="shape-grid" class="shape-grid" style="display: grid; margin-top: 0; padding: 0; border: none; background: transparent;">
                <button class="add-shape-btn" data-shape="Cube" title="Box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg></button>
                <button class="add-shape-btn" data-shape="Sphere" title="Sphere"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path><path d="M2 12h20"></path></svg></button>
                <button class="add-shape-btn" data-shape="Cone" title="Cone"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 20h20L12 2z"></path><path d="M12 22c-5.52 0-10-1.79-10-4s4.48-4 10-4 10 1.79 10 4-4.48 4-10 4z"></path></svg></button>
                <button class="add-shape-btn" data-shape="Cylinder" title="Cylinder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 19c0 1.66-4.03 3-9 3s-9-1.34-9-3V5"></path><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"></path></svg></button>
                <button class="add-shape-btn" data-shape="Torus" title="Torus">🍩</button>
                <button class="add-shape-btn" data-shape="Empty" title="Empty Group">📁</button>
            </div>
        </div>
        <div id="collection-dropdown" class="dropdown-panel" style="left: 46px; flex-direction: column; width: max-content; min-width: 100px;">
            <div id="collection-list" style="display: block; margin-top: 0;"></div>
            <button id="add-selected-root-btn" class="btn primary" style="display: none; margin-top: 4px;">Define Entity</button>
        </div>
    </div>

    <div id="tools-panel" class="floating-panel" style="top: 46px; left: 117px; flex-direction: row; width: 103px; box-sizing: border-box;">
        <div class="drag-grip" id="tools-drag-grip">⋮</div>
        <div style="display: flex; gap: 4px; padding: 4px; align-items: center; justify-content: space-between; flex-grow: 1;">
            <button id="btn-origin-bottom" class="square-btn" style="width: 24px; height: 24px;" title="Origin to Bottom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v14M5 9l7 7 7-7M5 22h14"></path></svg></button>
            <button id="btn-move-to-zero" class="square-btn" style="width: 24px; height: 24px;" title="Move to Zero"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"></circle><path d="M12 2v6M12 16v6M2 12h6M16 12h6"></path></svg></button>
            <button id="btn-multi-select" class="square-btn" style="width: 24px; height: 24px;" title="Multi-Select Mode"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></button>
        </div>
    </div>

    <div id="settings-panel" class="floating-panel" style="display: none; top: 10px; left: 254px; flex-direction: column; padding: 0; width: 140px;">
        <div class="drag-header-top" id="settings-drag-header"><span>Settings</span></div>
        <div class="floating-content" style="padding: 4px;">
            <div class="transform-group" style="grid-template-columns: 1fr 20px;"><label style="text-align: left; grid-column: 1/2;">Outline</label><input type="checkbox" id="set-outline" checked style="grid-column: 2/3;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 20px;"><label style="text-align: left; grid-column: 1/2;">Highlight</label><input type="checkbox" id="set-highlight" style="grid-column: 2/3;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 30px;"><label style="text-align: left; grid-column: 1/2;">Vis. Col</label><input type="color" id="set-out-color" value="#ffffff" style="grid-column: 2/3; height: 16px; border: none; padding: 0;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 30px;"><label style="text-align: left; grid-column: 1/2;">Hid. Col</label><input type="color" id="set-out-hidden-color" value="#444444" style="grid-column: 2/3; height: 16px; border: none; padding: 0;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 40px;"><label style="text-align: left; grid-column: 1/2;">Hid. Opac</label><input type="number" step="0.1" id="set-out-hidden-opacity" value="0.5" style="grid-column: 2/3;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 40px;"><label style="text-align: left; grid-column: 1/2;">Thickness</label><input type="number" step="0.05" id="set-out-thick" value="1" style="grid-column: 2/3;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 40px;"><label style="text-align: left; grid-column: 1/2;">Strength</label><input type="number" step="0.1" id="set-out-strength" value="5" style="grid-column: 2/3;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 40px;"><label style="text-align: left; grid-column: 1/2;">Glow</label><input type="number" step="0.1" id="set-out-glow" value="0" style="grid-column: 2/3;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 40px;"><label style="text-align: left; grid-column: 1/2;">Pulse</label><input type="number" step="0.1" id="set-out-pulse" value="0" style="grid-column: 2/3;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 40px;"><label style="text-align: left; grid-column: 1/2;">Dot Size</label><input type="number" step="0.01" id="set-dot-size" value="0.02" style="grid-column: 2/3;"></div>
            <div class="transform-group" style="grid-template-columns: 1fr 20px;"><label style="text-align: left; grid-column: 1/2;">Gizmo Top</label><input type="checkbox" id="set-gizmo-ontop" checked style="grid-column: 2/3;"></div>
        </div>
    </div>

    <div id="floating-properties" class="floating-panel" style="display: none; top: 82px; left: 10px; flex-direction: column; padding: 0;">
        <div class="drag-header-top" id="properties-drag-header" style="align-items: center; padding: 4px 6px; display: flex;">
            <span id="active-obj-name" style="flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 4px; cursor: grab; touch-action: none;">Properties</span>
            <div style="display: flex; gap: 4px; align-items: center;" onpointerdown="event.stopPropagation()">
                <button id="btn-lock-toggle" class="square-btn" style="width: 16px; height: 16px; background: transparent; border: none; padding: 1px;" title="Lock Transform"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                <button id="delete-btn" class="square-btn" style="width: 16px; height: 16px; background: transparent; border: none; padding: 1px; color: #e74c3c;" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg></button>
            </div>
        </div>
        <div class="floating-content" style="display: none;">
            <div class="accordion-header">Transform</div>
            <div class="accordion-content" id="acc-transform" style="display: flex;">
                <div class="transform-group"><label>P</label><input type="number" step="0.01" id="posX"><input type="number" step="0.01" id="posY"><input type="number" step="0.01" id="posZ"></div>
                <div class="transform-group"><label>R</label><input type="number" step="1" id="rotX"><input type="number" step="1" id="rotY"><input type="number" step="1" id="rotZ"></div>
                <div class="transform-group"><label>S</label><input type="number" step="0.01" id="scaleX"><input type="number" step="0.01" id="scaleY"><input type="number" step="0.01" id="scaleZ"></div>
            </div>
            
            <div class="accordion-header" id="acc-shape-header">Shape</div>
            <div class="accordion-content" id="acc-shape"><div id="geom-params-container" style="display: flex; flex-direction: column; gap: 1px;"></div></div>
            
            <div class="accordion-header" id="acc-cuts-header">Cuts</div>
            <div class="accordion-content" id="acc-cuts"><div id="cuts-params-container" style="display: flex; flex-direction: column; gap: 1px;"></div></div>

            <div class="accordion-header" id="acc-mat-header">Material</div>
            <div class="accordion-content" id="acc-mat">
                <div id="mat-params-container">
                    <div class="transform-group"><label>Color</label><input type="color" id="obj-color" style="grid-column: 2 / 5; width: 100%; height: 16px; border: none; padding: 0; background: transparent; cursor: pointer;"></div>

    <script type="module" id="ShapeGeneratorModule">
        import * as THREE from 'three';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

        class ShapeGenerator {
            constructor() {
                this.generators = {
                    box: this.getRoundedBoxGeo.bind(this), cyl: this.getCylinderGeo.bind(this),
                    cone: this.getConeGeo.bind(this), sphere: this.getSphereGeo.bind(this), torus: this.getTorusGeo.bind(this)
                };
            }
            generate(type, params) { return this.generators[type] ? this.generators[type](params) : new THREE.BufferGeometry(); }
            flipFaces(geometry) {
                const index = geometry.index;
                if (index) { const arr = index.array; for (let i = 0; i < index.count; i += 3) { const tmp = arr[i + 1]; arr[i + 1] = arr[i + 2]; arr[i + 2] = tmp; } }
                const normals = geometry.attributes.normal;
                if (normals) for (let i = 0; i < normals.count; i++) normals.setXYZ(i, -normals.getX(i), -normals.getY(i), -normals.getZ(i));
            }
            applyInversion2D(P_normal, r) {
                const S = new THREE.Vector2(Math.abs(P_normal.x) > 1e-6 ? Math.sign(P_normal.x) * r : 0, Math.abs(P_normal.y) > 1e-6 ? Math.sign(P_normal.y) * r : 0);
                const S_to_P = S.clone().sub(P_normal); let P_inv = new THREE.Vector2();
                if (S_to_P.lengthSq() > 1e-12) { S_to_P.setLength(r); P_inv.copy(S).sub(S_to_P); } else P_inv.copy(P_normal);
                return P_inv;
            }
            getProfileCorner(cx, cy, r, angleStart, angleSweep, progress, p) {
                if (r === 0) return new THREE.Vector2(cx, cy);
                const a = angleStart + angleSweep * progress;
                let P = new THREE.Vector2(Math.cos(a) * r, Math.sin(a) * r);
                if (p.invertRadius) P = this.applyInversion2D(P, r);
                return new THREE.Vector2(cx + P.x, cy + P.y);
            }
            getLatheCuts(points, p, isClosedProfile = false) {
                if (points.length < 2) return new THREE.BufferGeometry();
                const cleanPoints = [points[0]];
                for (let i = 1; i < points.length; i++) if (points[i].distanceTo(cleanPoints[cleanPoints.length - 1]) > 1e-6) cleanPoints.push(points[i]);
                points = cleanPoints; if (points.length < 2) return new THREE.BufferGeometry();
                let pStart = 0, pLen = Math.PI * 2, doCaps = true;
                if (p.cutRadial) { pLen = p.radialAngle * Math.PI / 180; pStart = p.radialOffset * Math.PI / 180; doCaps = p.radialCap; } 
                else {
                    const offX = p.offsetX * Math.PI, offZ = p.offsetZ * Math.PI;
                    if (p.cutX && p.cutZ) { pLen = Math.PI / 2; if (!p.flipX && !p.flipZ) pStart = -Math.PI / 2 + offZ; if (!p.flipX && p.flipZ) pStart = 0 + offX; if (p.flipX && !p.flipZ) pStart = Math.PI + offX; if (p.flipX && p.flipZ) pStart = Math.PI / 2 + offZ; }
                    else if (p.cutX) { pLen = Math.PI + (p.flipX ? offX : -offX); pStart = p.flipX ? Math.PI / 2 - offX : -Math.PI / 2; } 
                    else if (p.cutZ) { pLen = Math.PI + (p.flipZ ? offZ : -offZ); pStart = p.flipZ ? 0 : Math.PI - offZ; }
                }
                const activeSegs = Math.max(3, Math.floor(p.radialSegments * (pLen / (Math.PI * 2))));
                const lathe = new THREE.LatheGeometry(points, activeSegs, pStart, pLen);
                if (pLen < Math.PI * 2 && doCaps) {
                    const shape = new THREE.Shape();
                    if (isClosedProfile) { shape.moveTo(points[0].x, points[0].y); for (let i = 1; i < points.length; i++) shape.lineTo(points[i].x, points[i].y); shape.lineTo(points[0].x, points[0].y); }
                    else { shape.moveTo(0, points[0].y); points.forEach(pt => shape.lineTo(pt.x, pt.y)); shape.lineTo(0, points[points.length - 1].y); }
                    const c0 = new THREE.ShapeGeometry(shape); c0.rotateY(-Math.PI / 2 + pStart);
                    const c1 = new THREE.ShapeGeometry(shape); c1.rotateY(-Math.PI / 2 + pStart + pLen); this.flipFaces(c1);
                    return BufferGeometryUtils.mergeGeometries([lathe, c0, c1]);
                }
                return lathe;
            }
            getCylinderGeo(p) {
                const points = [], w2 = p.width / 2, h2 = p.height / 2, r = p.cornerSegments === 0 ? 0 : Math.min(p.radius, w2, h2), oy = p.offsetY * h2;
                const fullPoints = []; fullPoints.push(new THREE.Vector2(0, -h2));
                for (let i = 0; i <= p.cornerSegments; i++) { let prog = i / Math.max(1, p.cornerSegments); prog = Math.sin(prog * Math.PI / 2); fullPoints.push(this.getProfileCorner(w2 - r, -h2 + r, r, -Math.PI / 2, Math.PI / 2, prog, p)); }
                const hSegs = Math.max(1, p.heightSegments || 1);
                for (let i = 1; i < hSegs; i++) { const t = i / hSegs; fullPoints.push(new THREE.Vector2(w2, (-h2 + r) * (1 - t) + (h2 - r) * t)); }

                    } else {

                        for (let i = 0; i < fullPoints.length; i++) { const pt = fullPoints[i]; if (pt.y >= oy) { if (!foundStart && i > 0) { const prev = fullPoints[i-1]; const t = (oy - prev.y) / (pt.y - prev.y); points.push(new THREE.Vector2(prev.x + t * (pt.x - prev.x), oy)); } foundStart = true; points.push(pt); } }

                for (let i = 0; i <= p.cornerSegments; i++) { let prog = i / Math.max(1, p.cornerSegments); prog = Math.sin(prog * Math.PI / 2); fullPoints.push(this.getProfileCorner(w2 - cr, -h2 + cr, cr, -Math.PI / 2, bottomSweep, prog, p)); }

            renderGeometryUI() {
                const core = this.core;
                const c = document.getElementById('geom-params-container'), h = document.getElementById('acc-shape-header'); 
                const cCuts = document.getElementById('cuts-params-container'), hCuts = document.getElementById('acc-cuts-header');
                if(!c || !h || !cCuts || !hCuts) return; 
                c.innerHTML = ''; cCuts.innerHTML = '';
                const m = core.selectedObjects.filter(o => o.isMesh && o.userData.shapeType && o.userData.shapeType!=='Empty' && o.userData.shapeType!=='GLTF');
                if(!m.length) { h.style.display='none'; hCuts.style.display='none'; return; }
                const st = core.getCommon(m, o => o.userData.shapeType); if(st === null) { h.style.display='none'; hCuts.style.display='none'; return; }
                h.style.display = 'flex'; hCuts.style.display = 'flex';
                
                const cutHierarchy = [
                    { toggle: 'cutX', subs: ['capX', 'flipX', 'flatX', 'capFlatX', 'offsetX'] },
                    { toggle: 'cutY', subs: ['capY', 'flipY', 'flatY', 'capFlatY', 'offsetY'] },
                    { toggle: 'cutZ', subs: ['capZ', 'flipZ', 'flatZ', 'capFlatZ', 'offsetZ'] },
                    { toggle: 'cutRadial', subs: ['radialAngle', 'radialOffset', 'radialCap'] }
                ];
                const bottomCuts = ['centerCut', 'centerBottom'];
                const allCutKeys = new Set([...bottomCuts]);
                cutHierarchy.forEach(g => { allCutKeys.add(g.toggle); g.subs.forEach(s => allCutKeys.add(s)); });

                const createInput = (key) => {
                    const r = document.createElement('div'); r.className = 'transform-group'; 
                    const l = document.createElement('label'); l.textContent = key.charAt(0).toUpperCase()+key.slice(1); l.title=key;
                    const val = core.getCommon(m, o=>o.userData.params[key]);

                    if (isBool) inp.checked = !!val; else { inp.value = val??""; inp.step=(key.includes('egment')||key==='detail')?'1':(key.includes('Angle')?'1':'0.1'); }
                    inp.onmousedown = () => { if(document.activeElement!==inp && !isBool) core.saveState(); };
                    inp.onchange = (e) => {

                    };
                    if (!isBool) inp.oninput = inp.onchange;

                    return r;
                };

                for (let key in m[0].userData.params) {
                    if (!allCutKeys.has(key)) c.appendChild(createInput(key));
                }
                
                cutHierarchy.forEach(group => {

                        cCuts.appendChild(createInput(group.toggle));
                        const isToggled = core.getCommon(m, o=>o.userData.params[group.toggle]);

                            const sub = document.createElement('div');
                            sub.style.cssText = 'display:flex;flex-direction:column;gap:1px;padding-left:4px;border-left:1px solid #444;margin-left:2px;margin-bottom:4px;';

                                if (m[0].userData.params[subKey] !== undefined) sub.appendChild(createInput(subKey));
                            });
                            cCuts.appendChild(sub);
                        }
                    }
                });

                bottomCuts.forEach(key => {
                    if (m[0].userData.params[key] !== undefined) cCuts.appendChild(createInput(key));
                });
                
                if(cCuts.children.length === 0) hCuts.style.display = 'none';
                if(c.children.length === 0) h.style.display = 'none';
            }

                    let parsedMat = null;
                    if (data.userData.shapeType === 'GLTF' && data.userData.gltfMatId) {
                        if (data.userData.gltfMatId.includes(',')) {
                            parsedMat = data.userData.gltfMatId.split(',').map(id => this.gltfMaterialCache[id]).filter(m => m);
                            if (parsedMat.length === 0) parsedMat = null;
                        } else parsedMat = this.gltfMaterialCache[data.userData.gltfMatId];
                    }
                    node.material = parsedMat || this.createMaterialFromUserData(data.userData);
                } else { node = new THREE.Group(); node.userData = data.userData; }
                this.configureNode(node, data);
                parent.add(node); if(data.children) data.children.forEach(c => this.deserializeNode(c, node));
                return node;
            }

            selectObject(obj, multi = false) {
                if (!obj) { if(!multi) this.selectedObjects=[]; }
                else if(Array.isArray(obj)) { if(!multi) this.selectedObjects=[]; obj.forEach(o=>{if(!this.selectedObjects.includes(o))this.selectedObjects.push(o);}); }
                else { if(multi) { const idx=this.selectedObjects.indexOf(obj); if(idx>-1) this.selectedObjects.splice(idx,1); else this.selectedObjects.push(obj); } else this.selectedObjects=[obj]; }
                this.ui.refreshSelectionUI();
            }

            addShape(shapeType) {
                this.saveState(); const p = this.editorRoot;
                if (shapeType === 'Empty') { const g = new THREE.Group(); g.name = "Empty."+Math.floor(Math.random()*1000).toString().padStart(3,'0'); g.userData = {shapeType:'Empty', transformLock:true, visible:true}; this.setupEmptyHelpers(g); p.add(g); this.ui.populateOutliner(); this.selectObject(g, false); return; }
                const mesh = new THREE.Mesh(new THREE.BufferGeometry()); mesh.name = shapeType+"."+Math.floor(Math.random()*1000).toString().padStart(3,'0');
                mesh.userData = this.getDefUserData(mesh.name.toLowerCase(), shapeType); mesh.material = this.createMaterialFromUserData(mesh.userData);
                this.applyHelper(mesh); this.rebuildGeometry(mesh); p.add(mesh);
                this.scene.updateMatrixWorld(true); const box = new THREE.Box3().setFromObject(mesh); if(!box.isEmpty() && box.min.y!==Infinity) mesh.position.y -= box.min.y; mesh.updateMatrixWorld(true);
                this.ui.populateOutliner(); this.selectObject(mesh, false);
            }

            deleteSelectedObjects() { if(!this.selectedObjects.length) return; this.saveState(); this.selectedObjects.forEach(o => { if(o===this.editorRoot)return; if(o.parent)o.parent.remove(o); o.traverse(c=>{if(c.geometry && !this.gltfGeometryCache[c.geometry.uuid])c.geometry.dispose(); if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>{if(!this.gltfMaterialCache[m.uuid])m.dispose();}); else if(!this.gltfMaterialCache[c.material.uuid])c.material.dispose();}}); }); this.gizmo.detach(); this.gizmoTarget = null; if(this.shapeGizmo) this.shapeGizmo.detach(); this.selectedObjects=[]; this.ui.populateOutliner(); this.ui.refreshSelectionUI(); }

            exportSceneToGLTF() {
                const targets = this.selectedObjects.length ? this.selectedObjects : [this.editorRoot];
                const exp = new GLTFExporter();
                const exportScene = new THREE.Scene();
                targets.forEach(obj => {
                    const clone = obj.clone(true); obj.updateMatrixWorld(true);
                    clone.matrix.copy(obj.matrixWorld); clone.matrix.decompose(clone.position, clone.quaternion, clone.scale);
                    const toRemove = []; clone.traverse(n => { if (n.userData?.isHelper || n.name.includes('OutlineMesh') || n.name.includes('AxesHelper') || n.name === 'WireframeHelper') toRemove.push(n); else n.userData = {}; });
                    toRemove.forEach(n => { if(n.parent) n.parent.remove(n); });
                    exportScene.add(clone);
                });
                exp.parse(exportScene, (g) => { 
                    const url = URL.createObjectURL(new Blob([JSON.stringify(g,null,2)], {type:'text/plain'})); 
                    const a = document.createElement('a'); a.href = url; a.download = `${this.selectedObjects.length===1 ? (this.selectedObjects[0].name||'object') : 'scene'}.gltf`; 
                    a.click(); URL.revokeObjectURL(url); 
                }, (err) => console.error(err), {binary:false});
            }

            importSceneFromGLTF(e) {
                const f = e.target.files[0]; if(!f) return; const r = new FileReader();
                r.onload = (ev) => {
                    const loader = new GLTFLoader(); const draco = new DRACOLoader();
                    draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
                    loader.setDRACOLoader(draco);
                    loader.parse(ev.target.result, '', (g) => {
                        this.saveState(); const sc = g.scene || g.scenes[0];
                        if (sc) {
                            const importedRoots = [...sc.children];
                            importedRoots.forEach(c => this.editorRoot.add(c));
                            const garbage = [];
                            importedRoots.forEach(rootObj => rootObj.traverse(n => {
                                if (n.type === 'AxesHelper' || n.name === 'WireframeHelper' || (n.type === 'LineSegments' && n.material?.color?.getHex() === 0x666666)) garbage.push(n);
                            }));
                            garbage.forEach(n => { if(n.parent) n.parent.remove(n); });
                            importedRoots.forEach(rootObj => {
                                const nodes = []; rootObj.traverse(n => nodes.push(n));
                                nodes.forEach((n, idx) => {
                                    if(!n.name || n.name.trim() === '') n.name = n.isMesh ? `Mesh_${idx}` : `Node_${idx}`;
                                    n.userData = { 
                                        shapeType: n.isMesh?'GLTF':'Empty', transformLock: true, visible: true, castShadow: true, receiveShadow: true,
                                        originalColor: [0.8,0.8,0.8], emissive: [0,0,0], materialType: 'Standard', roughness: 0.5, metalness: 0.0, transparent: false, opacity: 1.0,
                                        wireframe: false, side: THREE.FrontSide, flatShading: false, depthTest: true, depthWrite: true, alphaTest: 0.0
                                    };
                                    if (n.isMesh) {
                                        if(n.material) {
                                            if(Array.isArray(n.material)) {
                                                n.userData.gltfMatId = n.material.map(mat => { this.gltfMaterialCache[mat.uuid]=mat; return mat.uuid; }).join(',');
                                                const m = n.material[0]; if(m?.color) n.userData.originalColor=[m.color.r,m.color.g,m.color.b];
                                            } else {
                                                const m = n.material; n.userData.gltfMatId=m.uuid; this.gltfMaterialCache[m.uuid]=m;
                                                if(m.color) n.userData.originalColor=[m.color.r,m.color.g,m.color.b];
                                            }
                                        }
                                        if(n.geometry) { n.userData.gltfGeomId=n.geometry.uuid; this.gltfGeometryCache[n.geometry.uuid]=n.geometry; }
                                        this.applyHelper(n);
                                    } else this.setupEmptyHelpers(n);
                                });
                            });
                            this.selectObject(importedRoots, false);
                        }
                        this.ui.populateOutliner();
                    }, err => console.error(err));
                };
                if(f.name.toLowerCase().endsWith('.glb')) r.readAsArrayBuffer(f); else r.readAsText(f); e.target.value = '';
            }
        }
        window.EditorCore = EditorCore;
    </script>

    <script type="module" id="AppInitModule">
        const app = new window.EditorCore();
        app.init();
    </script>
</body>
